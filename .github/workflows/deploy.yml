name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build extension + website
        run: npm run build:website

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          MSG=$(git log -1 --format="%s" | LC_ALL=C tr -dc '[\040-\176]' | head -c 200)
          if [ -z "$MSG" ]; then MSG="Update site"; fi
          npx wrangler pages deploy dist-website --project-name=pinmark --branch=main --commit-message "$MSG"
